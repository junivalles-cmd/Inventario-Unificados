<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Inventario Online</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{font-family:system-ui;margin:0;background:#eef2f7}

.header{
  background:#fff;
  padding:12px;
  font-weight:bold;
  font-size:18px
}

.card{
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.05)
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc
}

button{
  width:100%;
  padding:12px;
  background:#0ea5e9;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:bold
}

.section{
  margin-top:10px;
  font-weight:bold;
  color:#0ea5e9;
  font-size:16px
}

.item{
  background:#fff;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid #e5e7eb
}

.row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:6px 0;
  border-bottom:1px dashed #ddd
}

.row:last-child{
  border-bottom:none
}

.label{
  font-weight:bold;
  min-width:140px;
  color:#374151
}

.alert{
  color:red;
  text-align:center;
  font-weight:bold;
  padding:15px
}

/* TABLA PC */
table{
  width:100%;
  border-collapse:collapse
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:left
}

th{
  background:#f1f5f9
}
</style>
</head>

<body>

<div class="header">Inventario Online</div>

<div class="card">
<input id="p" placeholder="Buscar Nº Parte">
<input id="d" placeholder="Buscar Descripción">
<button onclick="buscar()">Buscar</button>
<div id="status">Cargando datos...</div>
</div>

<div class="card">
<b>Resultados</b> <span id="count">0</span>
<div id="r"></div>
</div>

<script>

let DATA=[]
let HEAD=[]

// 🔥 PEGA TU LINK AQUÍ
const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRgZOJ-NC7hxBmVgfRPR0agqkrV2LRVOKqyC_1qerVDPZquweN45wmIuDQmwzS12Z1nxuqPqmNB0Fjr/pub?output=csv"

// detectar PC
function esPC(){
  return window.innerWidth > 768
}

// parser CSV
function parseCSV(text){
  const rows = text.split(/\r?\n/).filter(Boolean)
  return rows.map(r=>{
    let cols=[], current="", inQuotes=false
    for(let i=0;i<r.length;i++){
      let c=r[i]
      if(c === '"'){ inQuotes=!inQuotes; continue }
      if(c === ',' && !inQuotes){
        cols.push(current); current=""
      } else {
        current+=c
      }
    }
    cols.push(current)
    return cols
  })
}

// cargar datos
async function cargarDatos(){
 try{
  const res = await fetch(URL_CSV + "&t=" + Date.now())
  const text = await res.text()

  const rows = parseCSV(text)

  HEAD = rows[0]

  DATA = rows.slice(1).map(r=>{
    let obj={}
    HEAD.forEach((h,i)=>obj[h]=r[i])
    return obj
  })

  document.getElementById("status").innerText="Datos cargados ✓"

 }catch(e){
  document.getElementById("status").innerText="❌ Error cargando datos"
 }
}

// limpiar nombre columnas
function limpiarCol(h){
 let s=h.toLowerCase()

 if(s.includes("descripcion")) return "DESCRIPCIÓN"
 if(s.includes("parte")) return "N° PARTE"
 if(s.includes("codigo")) return "CÓDIGO"
 if(s.includes("inventario")) return "INVENTARIO"
 if(s.includes("ubic")) return "UBICACIÓN"
 if(s.includes("cantidad")) return "CANTIDAD"

 return h
}

// buscar
function buscar(){

 let p=document.getElementById('p').value.toLowerCase()
 let d=document.getElementById('d').value.toLowerCase()

 if(!p && !d){
  r.innerHTML=""
  count.innerText=0
  return
 }

 const COL_PARTE = HEAD.find(h=>h.toLowerCase().includes("parte"))
 const COL_DESC  = HEAD.find(h=>h.toLowerCase().includes("desc"))
 const COL_SEC   = HEAD.find(h=>h.toLowerCase().includes("inventario")) || HEAD[0]

 let f=DATA.filter(x=>
  (!p || String(x[COL_PARTE]||"").toLowerCase().includes(p)) &&
  (!d || String(x[COL_DESC]||"").toLowerCase().includes(d))
 )

 if(f.length===0){
  r.innerHTML="<div class='alert'>SIN EXISTENCIA</div>"
  count.innerText=0
  return
 }

 // 💻 PC → TABLA
 if(esPC()){

  let html="<table><thead><tr>"

  HEAD.forEach(h=>{
    let s=h.toLowerCase()
    if(s.includes("p.unitario") || s.includes("p dólar") || s.includes("item")) return
    html+=`<th>${limpiarCol(h)}</th>`
  })

  html+="</tr></thead><tbody>"

  f.forEach(row=>{
    html+="<tr>"
    HEAD.forEach(h=>{
      let s=h.toLowerCase()
      if(s.includes("p.unitario") || s.includes("p dólar") || s.includes("item")) return
      html+=`<td>${row[h]||""}</td>`
    })
    html+="</tr>"
  })

  html+="</tbody></table>"

  r.innerHTML=html
  count.innerText=f.length
  return
 }

 // 📱 MÓVIL → TARJETAS
 let grupos={}

 f.forEach(i=>{
  let s=i[COL_SEC]||"SIN UBICACION"
  if(!grupos[s]) grupos[s]=[]
  grupos[s].push(i)
 })

 let html=""

 Object.keys(grupos).forEach(sec=>{
  html+=`<div class="section">${sec}</div>`

  grupos[sec].forEach(item=>{
    html+=`<div class="item">`

    HEAD.forEach(h=>{
      let s=h.toLowerCase()
      if(s.includes("p.unitario") || s.includes("p dólar") || s.includes("item")) return

      html+=`
      <div class="row">
        <div class="label">${limpiarCol(h)}</div>
        <div>${item[h]||""}</div>
      </div>`
    })

    html+=`</div>`
  })
 })

 r.innerHTML=html
 count.innerText=f.length
}

// iniciar
cargarDatos()

</script>

</body>
</html>
