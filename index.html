<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Inventario Pro</title>

<style>
body{
  font-family:system-ui;
  margin:0;
  background:#eef2f7;
}

.header{
  background:#0ea5e9;
  color:white;
  padding:14px;
  font-weight:bold;
  font-size:18px;
}

.card{
  background:white;
  margin:10px;
  padding:14px;
  border-radius:14px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#0ea5e9;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.section{
  margin-top:15px;
  font-weight:bold;
  color:#0ea5e9;
  font-size:16px;
}

.item{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid #e5e7eb;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  padding:8px 0;
  border-bottom:1px dashed #ddd;
}

.row:last-child{
  border-bottom:none;
}

.label{
  font-weight:bold;
  min-width:130px;
  color:#374151;
}

.value{
  text-align:right;
  max-width:60%;
  word-break:break-word;
}

.stock-ok{
  color:#16a34a;
  font-weight:bold;
}

.stock-zero{
  color:#dc2626;
  font-weight:bold;
}

.alert{
  text-align:center;
  color:red;
  font-weight:bold;
  padding:15px;
}

/* TABLA PC */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #ddd;
  padding:10px;
}

th{
  background:#0ea5e9;
  color:white;
}
</style>
</head>

<body>

<div class="header">Inventario Pro</div>

<div class="card">
<input id="p" placeholder="Buscar Nº Parte">
<input id="d" placeholder="Buscar Descripción">
<button onclick="buscar()">Buscar</button>
<div id="status">Cargando datos...</div>
</div>

<div class="card">
<b>Resultados</b> <span id="count">0</span>
<div id="r"></div>
</div>

<script>

let DATA=[]
let HEAD=[]

const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRgZOJ-NC7hxBmVgfRPR0agqkrV2LRVOKqyC_1qerVDPZquweN45wmIuDQmwzS12Z1nxuqPqmNB0Fjr/pub?output=csv"

function esPC(){
  return window.innerWidth > 768
}

function parseCSV(text){
  const rows = text.split(/\r?\n/).filter(Boolean)
  return rows.map(r=>{
    let cols=[], cur="", q=false
    for(let c of r){
      if(c=='"'){q=!q;continue}
      if(c==','&&!q){cols.push(cur);cur=""}
      else cur+=c
    }
    cols.push(cur)
    return cols
  })
}

async function cargarDatos(){
 try{
  const res = await fetch(URL_CSV + "&t=" + Date.now())
  const text = await res.text()

  const rows = parseCSV(text)

  HEAD = rows[0]

  DATA = rows.slice(1).map(r=>{
    let o={}
    HEAD.forEach((h,i)=>o[h]=r[i])
    return o
  })

  status.innerText="Datos cargados ✓"
 }catch(e){
  status.innerText="Error cargando datos"
 }
}

function limpiarCol(h){
 let s=h.toLowerCase()
 if(s.includes("descripcion")) return "DESCRIPCIÓN"
 if(s.includes("parte")) return "N° PARTE"
 if(s.includes("codigo")) return "CÓDIGO"
 if(s.includes("inventario")) return "INVENTARIO"
 if(s.includes("ubic")) return "UBICACIÓN"
 if(s.includes("cantidad")) return "CANTIDAD"
 return h
}

function buscar(){

 let p=pInput.value.toLowerCase()
 let d=dInput.value.toLowerCase()

 if(!p && !d){
  r.innerHTML=""
  count.innerText=0
  return
 }

 const COL_PARTE = HEAD.find(h=>h.toLowerCase().includes("parte"))
 const COL_DESC  = HEAD.find(h=>h.toLowerCase().includes("desc"))
 const COL_SEC   = HEAD.find(h=>h.toLowerCase().includes("inventario")) || HEAD[0]

 let f=DATA.filter(x=>
  (!p || String(x[COL_PARTE]||"").toLowerCase().includes(p)) &&
  (!d || String(x[COL_DESC]||"").toLowerCase().includes(d))
 )

 if(f.length===0){
  r.innerHTML="<div class='alert'>SIN EXISTENCIA</div>"
  count.innerText=0
  return
 }

 // 💻 PC TABLA
 if(esPC()){
  let html="<table><thead><tr>"

  HEAD.forEach(h=>{
    let s=h.toLowerCase()
    if(s.includes("p.unitario")||s.includes("p dólar")||s.includes("item")) return
    html+=`<th>${limpiarCol(h)}</th>`
  })

  html+="</tr></thead><tbody>"

  f.forEach(row=>{
    html+="<tr>"
    HEAD.forEach(h=>{
      let s=h.toLowerCase()
      if(s.includes("p.unitario")||s.includes("p dólar")||s.includes("item")) return
      html+=`<td>${row[h]||""}</td>`
    })
    html+="</tr>"
  })

  html+="</tbody></table>"
  r.innerHTML=html
  count.innerText=f.length
  return
 }

 // 📱 TARJETAS PRO
 let grupos={}

 f.forEach(i=>{
  let s=i[COL_SEC]||"SIN UBICACION"
  if(!grupos[s]) grupos[s]=[]
  grupos[s].push(i)
 })

 let html=""

 Object.keys(grupos).forEach(sec=>{
  html+=`<div class="section">${sec}</div>`

  grupos[sec].forEach(item=>{
    html+=`<div class="item">`

    HEAD.forEach(h=>{
      let s=h.toLowerCase()
      if(s.includes("p.unitario")||s.includes("p dólar")||s.includes("item")) return

      let val=item[h]||""

      // color stock
      if(s.includes("cantidad")){
        let n=parseFloat(val)
        val = `<span class="${n>0?'stock-ok':'stock-zero'}">${val}</span>`
      }

      html+=`
      <div class="row">
        <div class="label">${limpiarCol(h)}</div>
        <div class="value">${val}</div>
      </div>`
    })

    html+=`</div>`
  })
 })

 r.innerHTML=html
 count.innerText=f.length
}

// inputs
const pInput=document.getElementById("p")
const dInput=document.getElementById("d")

cargarDatos()

</script>

</body>
</html>
